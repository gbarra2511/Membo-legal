<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Membo — Suas contas em dia</title>
<style>
  :root{--cream:#F5F1E8;--ink:#211E17;--muted:#6E675A;--gold:#8A5E10;--card:#fff;--line:#E6DFD1}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:520px;padding:40px 24px}
  h1{font-size:40px;margin:0 0 6px}
  .gold{color:var(--gold)}
  p{color:var(--muted);margin:0 0 28px}
  .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;
    padding:12px 22px;border-radius:999px;font-weight:600}
  a.btn.alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  footer{margin-top:34px;color:var(--muted);font-size:13px}
  a.mail{color:var(--gold)}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Membo<span class="gold">.</span></h1>
    <p>O app que te lembra de pagar as contas — até você pagar.</p>
    <div class="links">
      <a class="btn" href="./privacy.html">Política de Privacidade</a>
      <a class="btn alt" href="./terms.html">Termos de Uso</a>
      <a class="btn alt" href="./support.html">Suporte</a>
    </div>
    <footer>Contato: <a class="mail" href="mailto:gbarra2511@icloud.com">gbarra2511@icloud.com</a><br>© 2026 Membo.</footer>
  </div>
</body>
</html>
